[workspace]
authors = ["matovitch <camille.brugel@laposte.net>"]
channels = ["conda-forge"]
name = "rh-memory"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "12.0"

[tasks]
test = "python -m pytest"
bench-exact-rh = "python benchmarks/bench_exact_parallel_rh.py"

[dependencies]
python = ">=3.14.4,<3.15"
pytorch-gpu = ">=2.10.0,<3"
ninja = "*"
cxx-compiler = "*"
pytest = "*"
torchvision = ">=0.26.0,<0.27"
triton = ">=3.6.0,<4"
cuda-nvcc = ">=12.9.86,<13"
cuda-cudart-dev = ">=12.9.79,<13"
jaxtyping = ">=0.3.7,<0.4"
