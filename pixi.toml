[workspace]
authors = ["matovitch <camille.brugel@laposte.net>"]
channels = ["conda-forge"]
name = "rh-memory"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "12.0"

[tasks]
# Usage: extra CLI args go after `--`, e.g. `pixi run test -- tests/test_surrogate.py -q`
test = "python -m pytest"
train-surrogate = "python experiments/train_surrogate.py"
train-decoder = "python experiments/train_decoder.py"
train-decoder-scatter = "python experiments/train_decoder_soft_scatter.py"
prepare-grayscale-data = "python experiments/prepare_grayscale_dataset.py"
train-flow-symmetric = "python experiments/train_flow_symmetric.py"
eval-flow-distributions = "python experiments/eval_flow_distributions.py"

[dependencies]
python = ">=3.14.4,<3.15"
pytorch-gpu = ">=2.10.0,<3"
pytest = "*"
torchvision = ">=0.26.0,<0.27"
triton = ">=3.6.0,<4"
cuda-nvcc = ">=12.9.86,<13"
cuda-cudart-dev = ">=12.9.79,<13"
jaxtyping = ">=0.3.7,<0.4"
