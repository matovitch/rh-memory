[workspace]
authors = ["matovitch <camille.brugel@laposte.net>"]
channels = ["conda-forge"]
name = "rh-memory"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "12.0"

[tasks]
# Usage: extra CLI args go after `--`, e.g. `pixi run test -- tests/test_surrogate.py -q`
lint = "ruff check ."
format = "ruff format ."
format-check = "ruff format . --check"
pre-commit = "pre-commit run --all-files"
pre-commit-install = "pre-commit install --install-hooks"
test = "python -m pytest"
typecheck = "basedpyright"
train-surrogate = "python scripts/train_surrogate.py"
train-decoder = "python scripts/train_decoder.py"
train-decoder-scatter = "python scripts/train_decoder_soft_scatter.py"
prepare-grayscale-data = "python scripts/prepare_grayscale_dataset.py"
train-flow-symmetric = "python scripts/train_flow_symmetric.py"
train-lpap-autoencoder = "python scripts/train_lpap_autoencoder.py"
eval-flow-i2e = "python scripts/eval_image_to_energy_distributions.py"
eval-flow-e2i = "python scripts/eval_energy_to_image_distributions.py"
train-reflow-i2e = "python scripts/train_flow_reflow.py --direction image-to-energy --teacher-checkpoint scripts/checkpoints/symmetric_flow_image_to_energy_checkpoint.pt --teacher-steps 128 --checkpoint scripts/checkpoints/reflow_image_to_energy_checkpoint.pt"
train-reflow-e2i = "python scripts/train_flow_reflow.py --direction energy-to-image --teacher-checkpoint scripts/checkpoints/symmetric_flow_energy_to_image_checkpoint.pt --teacher-steps 128 --checkpoint scripts/checkpoints/reflow_energy_to_image_checkpoint.pt"

[target.unix.activation.env]
PYTHONPATH = "$PIXI_PROJECT_ROOT/src"

[dependencies]
python = ">=3.14.4,<3.15"
pytorch-gpu = ">=2.10.0,<3"
pytest = "*"
torchvision = ">=0.26.0,<0.27"
triton = ">=3.6.0,<4"
cuda-nvcc = ">=12.9.86,<13"
cuda-cudart-dev = ">=12.9.79,<13"
jaxtyping = ">=0.3.7,<0.4"
ruff = ">=0.15.11,<0.16"
basedpyright = ">=1.39.3,<2"
pre-commit = ">=4.6.0,<5"
